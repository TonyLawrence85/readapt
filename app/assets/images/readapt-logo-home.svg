<svg width="500" height="120" viewBox="0 0 500 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bluePageGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e6fa8"/>
      <stop offset="100%" stop-color="#1a4f7a"/>
    </linearGradient>
    <linearGradient id="bookmarkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2ed882"/>
      <stop offset="100%" stop-color="#1a9e7a"/>
    </linearGradient>
  </defs>

  <!-- Lignes de mouvement -->
  <line x1="4"  y1="38" x2="26" y2="38" stroke="#2bbfa8" stroke-width="5"   stroke-linecap="round" opacity="0.95"/>
  <line x1="9"  y1="54" x2="26" y2="54" stroke="#2bbfa8" stroke-width="4.2" stroke-linecap="round" opacity="0.65"/>
  <line x1="4"  y1="70" x2="26" y2="70" stroke="#2bbfa8" stroke-width="3.5" stroke-linecap="round" opacity="0.38"/>

  <!-- Page bleue -->
  <rect x="26" y="20" width="52" height="68" rx="8" fill="url(#bluePageGrad)"/>

  <!-- Lignes texte sur la page -->
  <line x1="38" y1="40" x2="68" y2="40" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="38" y1="55" x2="68" y2="55" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>
  <line x1="38" y1="70" x2="55" y2="70" stroke="white" stroke-width="3.5" stroke-linecap="round" opacity="0.75"/>

  <!-- Signet vert -->
  <path d="M60 14 L90 14 L90 62 L75 50 L60 62 Z" fill="url(#bookmarkGrad)"/>
  <!-- Reflet haut signet -->
  <path d="M60 14 L90 14 L90 20 L60 20 Z" fill="white" opacity="0.18"/>

  <!-- Wordmark : un seul bloc de texte, tspan collé -->
  <text
    x="108"
    y="80"
    font-family="'Georgia', 'Times New Roman', serif"
    font-weight="700"
    font-size="58"
    letter-spacing="-1.5"
  ><tspan fill="#1a4f7a">Read</tspan><tspan fill="#1a9e7a">apt</tspan></text>

</svg>
